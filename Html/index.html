<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/Css/index.css">
  <title>BookMark-Saver</title>
</head>
<body>
  <!--Start a container-->
  <div class="container">
    <!--Start a bookmark-->
    <h1 id="header">Bookmark Saver</h1>
    <div class="main-content">
      <form id="bookMark-Info">
        <input type="text" id="bookMark-name" placeholder="Bookmark Name" required>
        <input type="url" id="bookMark-url" placeholder="Bookmark URl" required>
        <button type="submit" id="add-bookMark">Add  Bookmark</button>
      </form>
      <!--End a bookmark-->
      <ul class="bookMark-list">
       <!-- Save a bookmark -->
      </ul>
    </div>
  </div>
  <script src="/Javascript/index.js"></script>
  <!--End a container-->
</body>
</html>
